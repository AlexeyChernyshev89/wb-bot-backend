<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Test</title>
</head>
<body>
    <h1>Результат проверки:</h1>
    <pre id="log"></pre>
    <script>
        var log = document.getElementById('log');
        log.textContent = 'Проверка Telegram.WebApp...\n';
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                var tg = window.Telegram.WebApp;
                log.textContent += '✅ Telegram.WebApp найден!\n';
                log.textContent += 'initData: ' + tg.initData + '\n';
                log.textContent += 'user id: ' + (tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 'не определён');
            } else {
                log.textContent += '❌ Telegram.WebApp НЕ найден.\n';
                log.textContent += 'window.Telegram: ' + (typeof window.Telegram) + '\n';
                log.textContent += 'User-Agent: ' + navigator.userAgent;
            }
        } catch (e) {
            log.textContent += 'ОШИБКА: ' + e.message;
        }
    </script>
</body>
</html>
